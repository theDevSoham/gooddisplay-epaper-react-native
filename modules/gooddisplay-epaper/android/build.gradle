plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.gooddisplayepaper'
version = '0.1.0'

android {
  namespace "expo.modules.gooddisplayepaper"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
  testOptions {
    unitTests.includeAndroidResources = true
  }
}

dependencies {
  testImplementation "junit:junit:4.13.2"
  testImplementation "org.robolectric:robolectric:4.14.1"
}
